<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynko - Crear Pregunta</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/adim.css">
    <link rel="stylesheet" href="/static/preguntas.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-content">
            <div class="logo-container">
                <div class="logo-placeholder">
                    <img src="https://cdn.phototourl.com/free/2026-06-08-2a556232-b138-49a7-a830-66b7ce8a4f19.png" alt="Lynko Logo">
                </div>
                <p class="logo-slogan">Panel de Control Central</p>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/admin"><i>📊</i> Analíticas e Hitos</a>
                </li>
                <li class="nav-item">
                    <a href="/admin/ranking"><i>🏆</i> Ranking mejores estudiantes</a>
                </li>
                <li class="nav-item active">
                    <a href="/admin/nuevas-preguntas"><i>➕</i> Nuevas preguntas</a>
                </li>
                <li class="nav-item">
                    <a href="/admin/estudiantes"><i>👥</i> Estudiantes</a>
                </li>
                <li class="nav-item">
                    <a href="/admin/preguntas"><i>❓</i> Banco de Preguntas</a>
                </li>
            </ul>
        </div>
        <div class="sidebar-footer-btn" style="padding: 20px;">
            <a href="/login" style="color: white; text-decoration: none; font-weight: 700; font-size: 14px;">🚪 Cerrar Sesión</a>
        </div>
    </aside>

    <main class="main-content-wrapper" style="padding: 40px; display: flex; justify-content: center; width: 100%;">

        <form action="/admin/nuevas-preguntas" method="POST" class="form-container">
            
            <h2 style="margin-bottom: 5px; font-weight: 900; text-align: center;">✨ Crear Nuevo Reto</h2>
            <p style="color: #718096; font-size: 14px; text-align: center; margin-bottom: 25px;">Añade preguntas al banco de retos de Lynko</p>

            <div class="form-group">
                <label>Materia de la Pregunta</label>
                <select name="id_materia" required>
                    <option value="1">Matemáticas</option>
                    <option value="2">Español</option>
                    <option value="3">Biología</option>
                </select>
            </div>

            <div class="form-group">
                <label>Enunciado de la Pregunta</label>
                <textarea name="pregunta" rows="3" placeholder="Ej: ¿Cuánto es 5 + 3?" required></textarea>
            </div>

            <div class="options-block">
                <h4>Opciones de Respuesta</h4>
                <div class="form-group">
                    <label>Opción 1</label>
                    <input type="text" name="opcion1" placeholder="Escribe la primera opción" required>
                </div>
                <div class="form-group">
                    <label>Opción 2</label>
                    <input type="text" name="opcion2" placeholder="Escribe la segunda opción" required>
                </div>
                <div class="form-group">
                    <label>Opción 3</label>
                    <input type="text" name="opcion3" placeholder="Escribe la tercera opción" required>
                </div>
            </div>

            <div class="form-group">
                <label>¿Cuál es la opción correcta?</label>
                <select name="correcta" required>
                    <option value="1">Opción 1</option>
                    <option value="2">Opción 2</option>
                    <option value="3">Opción 3</option>
                </select>
            </div>

            <input type="hidden" name="nivel" value="1">

            <div class="form-group">
                <label>Puntos de recompensa (EXP)</label>
                <input type="number" name="puntos" value="10" min="5" max="100" required>
            </div>

            <button type="submit" class="btn-submit">Guardar Pregunta</button>
        </form>

    </main>

</body>
</html>
